version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env  
    restart: always
    networks:
      - task-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    restart: always
    networks:
      - task-network

networks:
  task-network:
    driver: bridge
