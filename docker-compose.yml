

version: "3.9"

services:
  backend:
    build: ./backend
    container_name: task-backend
    ports:
      - "5000:5000"

   
    env_file:
      - .env

    volumes:
      - ./backend:/app

    restart: always

  frontend:
    build: ./frontend
    container_name: task-frontend
    ports:
      - "3000:3000"

    depends_on:
      - backend

    restart: always