services:
  backend:
    build: ./backend
    container_name: task-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: always
    networks:
      - task-network

  frontend:
    build: ./frontend
    container_name: task-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - task-network

networks:
  task-network:
    driver: bridge
